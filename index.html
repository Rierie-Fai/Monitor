<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pantau Pro - Setoran</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

<div class="sync-banner" id="sync-indicator">☁️ Menyinkronkan...</div>

<div id="drawer-overlay" class="drawer-overlay" onclick="closeDrawers()"></div>

<div id="drawer-left" class="drawer drawer-left">
    <div class="drawer-header">
        <h3 style="margin:0; font-family:monospace; color:var(--primary);">[ SYSTEM_CORE ]</h3>
        <button class="btn-danger-sm" style="font-size:1.5rem;" onclick="closeDrawers()">✕</button>
    </div>
    <div class="drawer-content">
        <label>CLOUD SYNC (SUPABASE)</label>
        <button class="btn btn-primary w-100" style="margin-bottom:8px" onclick="manualUpload()">☁️ PUSH TO CLOUD</button>
        <button class="btn btn-outline w-100" style="margin-bottom:20px" onclick="manualDownload()">☁️ PULL FROM CLOUD</button>
        
        <label>LOCAL STORAGE</label>
        <button class="btn btn-success w-100" style="margin-bottom:8px" onclick="backupData()">💾 EXPORT JSON</button>
        <label class="btn btn-outline w-100" style="text-align:center; cursor:pointer; display:block; margin:0;">
            📂 IMPORT JSON
            <input type="file" style="display:none" onchange="restoreData(event)" accept=".json">
        </label>

        <div style="margin-top:30px; border-top: 1px dashed var(--border-mecha); padding-top:15px;">
            <label>NOTIFICATIONS</label>
            <button id="btn-notif-drawer" class="btn btn-outline w-100" onclick="mintaIzinNotifikasi()">🔔 AKTIFKAN PENGINGAT</button>
        </div>
    </div>
</div>

<div id="drawer-right" class="drawer drawer-right">
    <div class="drawer-header">
        <h3 id="setup-title" style="margin:0; font-family:monospace; color:var(--primary);">[ NEW_ENTRY ]</h3>
        <button class="btn-danger-sm" style="font-size:1.5rem;" onclick="closeDrawers()">✕</button>
    </div>
    <div class="drawer-content">
        <label>Nama Pinjaman / Debitur</label>
        <input type="text" id="input-nama" placeholder="Contoh: KUR BRI">
        
        <div class="grid-2">
            <div><label>Total Pokok (Rp)</label><input type="number" id="input-total"></div>
            <div><label>Bunga Total (%)</label><input type="number" id="input-bunga" value="0"></div>
        </div>
        
        <div class="grid-2">
            <div><label>Setoran Per Bulan (Rp)</label><input type="number" id="input-setoran"></div>
            <div><label>Durasi (Bulan)</label><input type="number" id="input-durasi"></div>
        </div>
        
        <label>Tanggal Jatuh Tempo Tiap Bulan (1-31)</label>
        <input type="number" id="input-tgl" min="1" max="31">
        
        <div class="mt-20">
            <button class="btn btn-primary w-100" onclick="simpanPinjaman()">SIMPAN DATA ENTRY</button>
        </div>
    </div>
</div>

<div class="container">
    <header>
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px">
            <button class="btn-icon" onclick="openDrawer('left')">⚙️ SYS</button>
            
            <div style="text-align:center">
                <h2 style="margin:0; font-size:1.4rem; color: var(--text);">Pantau <span style="color:var(--primary)">Pro</span></h2>
                <span style="font-size:0.65rem; color:var(--muted); font-weight:800; letter-spacing: 2px;">ONLINE</span>
            </div>
            
            <button class="btn-icon add-btn" onclick="bukaDrawerSetup()">+ ADD</button>
        </div>

        <div class="search-container">
            <span class="search-icon">🔍</span>
            <input type="text" id="search-input" class="search-input" placeholder="Cari nama pinjaman..." onkeyup="render()">
        </div>
    </header>

    <div id="loan-list"></div>
</div>

<div id="modal-bayar" class="overlay">
    <div class="card modal">
        <h2 style="margin-top:0; font-family:monospace; color:var(--success)">[ CATAT_BAYAR ]</h2>
        <p style="font-size:0.8rem; color:var(--muted); margin-bottom:15px">Target: <strong id="bayar-untuk-nama"></strong></p>
        
        <input type="hidden" id="edit-history-index">
        
        <label>Tanggal Aktual Pembayaran</label>
        <input type="date" id="bayar-tgl">
        
        <label>Nominal Pembayaran (Rp)</label>
        <input type="number" id="bayar-nominal">

        <label>Alokasi Pembayaran Untuk:</label>
        <div class="grid-2">
            <select id="bayar-bulan">
                <option value="1">Januari</option><option value="2">Februari</option><option value="3">Maret</option>
                <option value="4">April</option><option value="5">Mei</option><option value="6">Juni</option>
                <option value="7">Juli</option><option value="8">Agustus</option><option value="9">September</option>
                <option value="10">Oktober</option><option value="11">November</option><option value="12">Desember</option>
            </select>
            <input type="number" id="bayar-tahun" placeholder="Tahun">
        </div>
        
        <div class="grid-2 mt-20">
            <button class="btn btn-outline" onclick="toggleModal('modal-bayar')">BATAL</button>
            <button class="btn btn-success" onclick="prosesSimpanBayar()">EKSEKUSI</button>
        </div>
    </div>
</div>

<div id="modal-bulk" class="overlay">
    <div class="card modal" style="border-color: #a855f7; box-shadow: 0 0 30px rgba(168, 85, 247, 0.3);">
        <h2 style="margin-top:0; color: #a855f7; font-family: monospace;">[ BULK_GENERATOR ]</h2>
        
        <label>Mulai Dari</label>
        <div class="grid-2" style="margin-bottom: 10px;">
            <select id="bulk-bln-mulai">
                <option value="1">Januari</option><option value="2">Februari</option><option value="3">Maret</option>
                <option value="4">April</option><option value="5">Mei</option><option value="6">Juni</option>
                <option value="7">Juli</option><option value="8">Agustus</option><option value="9">September</option>
                <option value="10">Oktober</option><option value="11">November</option><option value="12">Desember</option>
            </select>
            <input type="number" id="bulk-thn-mulai" placeholder="Tahun">
        </div>

        <label>Sampai Dengan</label>
        <div class="grid-2" style="margin-bottom: 10px;">
            <select id="bulk-bln-selesai">
                <option value="1">Januari</option><option value="2">Februari</option><option value="3">Maret</option>
                <option value="4">April</option><option value="5">Mei</option><option value="6">Juni</option>
                <option value="7">Juli</option><option value="8">Agustus</option><option value="9">September</option>
                <option value="10">Oktober</option><option value="11">November</option><option value="12">Desember</option>
            </select>
            <input type="number" id="bulk-thn-selesai" placeholder="Tahun">
        </div>
        
        <label>Nominal & Tanggal Aktual Bayar</label>
        <div class="grid-2">
            <input type="number" id="bulk-nominal" placeholder="Nominal">
            <input type="number" id="bulk-tgl" min="1" max="31" value="25" placeholder="Tgl">
        </div>

        <label>Timing Pembayaran</label>
        <select id="bulk-timing" style="margin-bottom: 15px;">
            <option value="sama">Dibayar pada bulan yang sama</option>
            <option value="sebelum">Dibayar pada bulan sebelumnya (H-1 Bulan)</option>
        </select>

        <div id="bulk-preview-area" style="display:none; margin-top: 15px;">
            <label style="color: var(--primary);">PREVIEW_DATA:</label>
            <div id="bulk-preview-list" class="preview-scroll"></div>
        </div>

        <div class="grid-2 mt-20">
            <button class="btn btn-outline" onclick="toggleModal('modal-bulk')">BATAL</button>
            <button id="btn-bulk-action" class="btn btn-primary" style="background:#a855f7; border:none;" onclick="generatePreview()">LIHAT PREVIEW</button>
        </div>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
