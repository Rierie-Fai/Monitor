<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pantau Setoran Pro</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#3b82f6">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <header>
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
            <h1 style="margin: 0; font-size: 1.4rem; color: #1e293b;">☰ Telegram</h1>
            <div id="sync-indicator" style="font-size: 0.7rem; color: #10b981; font-weight: bold; display: none;">SINKRON...</div>
        </div>
        
        <div class="action-bar">
            <button class="btn btn-primary flex-btn" onclick="bukaModalSetup()">
                + Pinjaman
            </button>
            <button class="btn btn-cloud flex-btn" onclick="toggleModal('modal-cloud')">
                ☁️ Cloud Sync
            </button>
        </div>

        <div class="search-container">
            <span class="search-icon">🔍</span>
            <input type="text" id="search-input" class="search-input" placeholder="Cari Pinjaman..." onkeyup="render()">
        </div>
    </header>

    <div id="modal-setup" class="overlay">
        <div class="card modal">
            <h2 id="setup-title" style="margin-top:0">Pinjaman Baru</h2>
            <input type="hidden" id="edit-loan-index">
            <label>Nama Pinjaman</label>
            <input type="text" id="input-nama" placeholder="Contoh: Cicilan Motor">
            <div class="grid-2">
                <div><label>Pokok (Rp)</label><input type="number" id="input-total"></div>
                <div><label>Bunga (%)</label><input type="number" id="input-bunga" step="0.1"></div>
            </div>
            <label>Setoran Berkala (Rp)</label>
            <input type="number" id="input-setoran">
            <div class="grid-2">
                <div><label>Tenor (Kali)</label><input type="number" id="input-durasi"></div>
                <div><label>Tgl Tempo</label><input type="number" id="input-tgl" min="1" max="31"></div>
            </div>
            <div class="grid-2">
                <button class="btn btn-outline" onclick="toggleModal('modal-setup')">Batal</button>
                <button class="btn btn-primary" onclick="simpanPinjaman()">Simpan</button>
            </div>
        </div>
    </div>

    <div id="modal-bayar" class="overlay">
        <div class="card modal">
            <h2 style="margin-top:0">Bayar Cicilan</h2>
            <p id="bayar-untuk-nama" class="badge-info"></p>
            <input type="hidden" id="edit-history-index">
            <label>Tanggal Bayar</label>
            <input type="date" id="bayar-tgl">
            <label>Nominal (Rp)</label>
            <input type="number" id="bayar-nominal">
            <div class="grid-2">
                <button class="btn btn-outline" onclick="toggleModal('modal-bayar')">Batal</button>
                <button class="btn btn-success" onclick="prosesSimpanBayar()">Simpan</button>
            </div>
        </div>
    </div>

    <div id="modal-cloud" class="overlay">
        <div class="card modal">
            <h2 style="margin-top:0">Awan & Backup</h2>
            <p style="font-size: 0.8rem; color: #64748b;">Gunakan Cloud untuk sinkron antar perangkat, atau File untuk cadangan manual.</p>
            
            <button class="btn btn-cloud w-100 mb-10" onclick="uploadKeSupabase()" id="btn-upload">⬆️ Upload ke Supabase</button>
            <button class="btn btn-outline w-100 mb-20" onclick="downloadDariSupabase()" id="btn-download">⬇️ Download (Gabung Data)</button>
            
            <div style="border-top: 1px solid #e2e8f0; padding-top: 15px;">
                <button class="btn-edit-sm w-100 mb-10" style="padding:10px" onclick="backupData()">📥 Backup ke File JSON</button>
                <label class="btn-edit-sm w-100" style="display:block; text-align:center; padding:10px; cursor:pointer">
                    📤 Restore dari File
                    <input type="file" accept=".json" style="display:none" onchange="restoreData(event)">
                </label>
            </div>
            <button class="btn btn-danger-sm w-100 mt-20" onclick="toggleModal('modal-cloud')">Tutup</button>
        </div>
    </div>

    <div id="loan-list"></div>
</div>

<script src="script.js"></script>
</body>
</html>
